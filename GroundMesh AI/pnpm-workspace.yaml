packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@google/genai': set this to true or false
  esbuild: set this to true or false
  protobufjs: set this to true or false
  sharp: set this to true or false
  unrs-resolver: set this to true or false

onlyBuiltDependencies:
  - "@google/genai"
  - "@tailwindcss/oxide"
  - "esbuild"
  - "protobufjs"
  - "sharp"
  - "unrs-resolver"
